version: "3.9"

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:

services:
  edge-proxy:
    image: caddy:2.8-alpine
    restart: always
    network_mode: host
    environment:
      EDGE_TTS_HOST: ${EDGE_TTS_HOST:?EDGE_TTS_HOST is required}
      EDGE_SEEDLAB_EVAL_HOST: ${EDGE_SEEDLAB_EVAL_HOST:?EDGE_SEEDLAB_EVAL_HOST is required}
      EDGE_TTS_UPSTREAM: ${EDGE_TTS_UPSTREAM:-127.0.0.1:19880}
      EDGE_SEEDLAB_EVAL_UPSTREAM: ${EDGE_SEEDLAB_EVAL_UPSTREAM:-127.0.0.1:18400}
    volumes:
      - ./edge-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      internal:
        aliases:
          - ai_influencer

  n8n:
    image: n8nio/n8n:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      tts-router-service:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: ${POSTGRES_HOST}
      DB_POSTGRESDB_PORT: ${POSTGRES_PORT}
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEBHOOK_URL: ${WEBHOOK_URL}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      TOPIC_CHANNELS: ${TOPIC_CHANNELS}
      NOTEBOOKLM_SERVICE_URL: ${NOTEBOOKLM_SERVICE_URL}
      NOTEBOOKLM_MAX_SOURCES: ${NOTEBOOKLM_MAX_SOURCES:-20}
      WF09_LOOKBACK_HOURS: ${WF09_LOOKBACK_HOURS:-24}
      N8N_WF12_WEBHOOK_URL: ${N8N_WF12_WEBHOOK_URL}
      TTS_ROUTER_URL: ${TTS_ROUTER_URL:-http://tts-router-service:8300}
      TTS_API_URL: ${TTS_ROUTER_URL:-http://tts-router-service:8300}
      TTS_REF_AUDIO_PATH: ${TTS_REF_AUDIO_PATH:-}
      TTS_PROMPT_TEXT: ${TTS_PROMPT_TEXT:-}
      TTS_TEXT_LANG: ${TTS_TEXT_LANG:-ko}
      TTS_PROMPT_LANG: ${TTS_PROMPT_LANG:-ko}
      TTS_TOP_K: ${TTS_TOP_K:-20}
      TTS_SAMPLE_STEPS: ${TTS_SAMPLE_STEPS:-32}
      TTS_SUPER_SAMPLING: ${TTS_SUPER_SAMPLING:-true}
      TTS_FRAGMENT_INTERVAL: ${TTS_FRAGMENT_INTERVAL:-0.4}
      N8N_POSTGRES_CREDENTIAL_NAME: ${N8N_POSTGRES_CREDENTIAL_NAME:-pg-credentials}
      SNS_PUBLISHER_SERVICE_URL: ${SNS_PUBLISHER_SERVICE_URL:-http://sns-publisher-service:8200}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
      HEYGEN_AVATAR_ID: ${HEYGEN_AVATAR_ID:-}
      HEYGEN_VIDEO_WIDTH: ${HEYGEN_VIDEO_WIDTH:-1080}
      HEYGEN_VIDEO_HEIGHT: ${HEYGEN_VIDEO_HEIGHT:-1920}
      HEYGEN_CAPTION_ENABLED: ${HEYGEN_CAPTION_ENABLED:-false}
      HEYGEN_SPEED: ${HEYGEN_SPEED:-1.3}
      HEYGEN_POLL_INTERVAL_SECONDS: ${HEYGEN_POLL_INTERVAL_SECONDS:-10}
      HEYGEN_MAX_WAIT_SECONDS: ${HEYGEN_MAX_WAIT_SECONDS:-900}
      HEYGEN_MOCK_ENABLED: ${HEYGEN_MOCK_ENABLED:-false}
      HEYGEN_MOCK_VIDEO_URL: ${HEYGEN_MOCK_VIDEO_URL:-https://samplelib.com/lib/preview/mp4/sample-5s.mp4}
      HEYGEN_PIPELINE_SERVICE_URL: ${HEYGEN_PIPELINE_SERVICE_URL:-http://heygen-pipeline-service:8100}
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_TASK_TIMEOUT: ${N8N_RUNNERS_TASK_TIMEOUT:-1200}
      N8N_SECURE_COOKIE: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      GENERIC_TIMEZONE: Asia/Seoul
      TZ: Asia/Seoul
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/n8n-config:ro
    entrypoint: ["tini", "--"]
    command: ["/bin/sh", "-c", "node /n8n-config/sync_workflows.js import && exec n8n start"]
    ports:
      - "5678:5678"
    networks:
      - internal

  notebooklm-service:
    build: ./notebooklm-service
    restart: always
    environment:
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      COST_TRACKING_GATEWAY_URL: ${COST_TRACKING_GATEWAY_URL:-http://messenger-gateway:8080}
      OPENAI_FALLBACK_API_KEY: ${OPENAI_FALLBACK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_CUA_CREATE_NOTEBOOK: ${OPENAI_API_KEY_CUA_CREATE_NOTEBOOK:-}
      OPENAI_API_KEY_CUA_MANAGE_SOURCES: ${OPENAI_API_KEY_CUA_MANAGE_SOURCES:-}
      OPENAI_API_KEY_CUA_GENERATE_REPORT: ${OPENAI_API_KEY_CUA_GENERATE_REPORT:-}
      SCRIPT_REWRITE_INPUT_COST_USD_PER_1M: ${SCRIPT_REWRITE_INPUT_COST_USD_PER_1M:-0}
      SCRIPT_REWRITE_OUTPUT_COST_USD_PER_1M: ${SCRIPT_REWRITE_OUTPUT_COST_USD_PER_1M:-0}
      NOTEBOOKLM_DATA_DIR: /app/data
      NOTEBOOKLM_SCRIPTS_DIR: /app/scripts
      GOOGLE_EMAIL: ${GOOGLE_EMAIL}
      GOOGLE_PASSWORD: ${GOOGLE_PASSWORD}
    volumes:
      - ./notebooklm-service/data:/app/data
    networks:
      - internal

  messenger-gateway:
    build: ./messenger-gateway
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
      notebooklm-service:
        condition: service_started
      heygen-pipeline-service:
        condition: service_started
      tts-router-service:
        condition: service_healthy
      seed-lab-service:
        condition: service_started
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_ALLOWED_CHANNEL_IDS: ${DISCORD_ALLOWED_CHANNEL_IDS}
      AUTO_REPORT_DISCORD_DELIVERY_ENABLED: ${AUTO_REPORT_DISCORD_DELIVERY_ENABLED:-true}
      AUTO_REPORT_MAX_ATTEMPTS_PER_DAY: ${AUTO_REPORT_MAX_ATTEMPTS_PER_DAY:-3}
      AUTO_REPORT_STALE_MINUTES: ${AUTO_REPORT_STALE_MINUTES:-45}
      PUBLISH_STALE_MINUTES: ${PUBLISH_STALE_MINUTES:-10}
      OPENAI_FALLBACK_API_KEY: ${OPENAI_FALLBACK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_REWRITE: ${OPENAI_API_KEY_REWRITE:-}
      SCRIPT_REWRITE_MODEL: ${SCRIPT_REWRITE_MODEL:-gpt-5.4}
      SCRIPT_REWRITE_TOPIC_KEYWORD_GUARD_ENABLED: ${SCRIPT_REWRITE_TOPIC_KEYWORD_GUARD_ENABLED:-false}
      N8N_WF01_WEBHOOK_URL: ${N8N_WF01_WEBHOOK_URL}
      N8N_WF05_WEBHOOK_URL: ${N8N_WF05_WEBHOOK_URL}
      N8N_WF06_WEBHOOK_URL: ${N8N_WF06_WEBHOOK_URL}
      N8N_WF08_WEBHOOK_URL: ${N8N_WF08_WEBHOOK_URL}
      N8N_WF11_WEBHOOK_URL: ${N8N_WF11_WEBHOOK_URL}
      N8N_WF12_WEBHOOK_URL: ${N8N_WF12_WEBHOOK_URL}
      SNS_PUBLISHER_SERVICE_URL: ${SNS_PUBLISHER_SERVICE_URL:-http://sns-publisher-service:8200}
      TOPIC_CHANNELS: ${TOPIC_CHANNELS}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET}
      MEDIA_S3_REGION: ${MEDIA_S3_REGION:-ap-northeast-2}
      MEDIA_S3_ROLE_ARN: ${MEDIA_S3_ROLE_ARN}
      MEDIA_S3_EXTERNAL_ID: ${MEDIA_S3_EXTERNAL_ID:-}
      MEDIA_S3_ROLE_SESSION_NAME: ${MEDIA_S3_ROLE_SESSION_NAME:-ai-influencer-media-session}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      MEDIA_PRESIGN_EXPIRES_SECONDS: ${MEDIA_PRESIGN_EXPIRES_SECONDS:-86400}
      MEDIA_MAX_DISCORD_FILE_BYTES: ${MEDIA_MAX_DISCORD_FILE_BYTES:-10485760}
      MEDIA_S3_PREFIX_REPORTS: ${MEDIA_S3_PREFIX_REPORTS:-subtitle}
      MEDIA_S3_PREFIX_LOGS: ${MEDIA_S3_PREFIX_LOGS:-logs}
      MEDIA_S3_PREFIX_SCRIPTS: ${MEDIA_S3_PREFIX_SCRIPTS:-scripts}
      MEDIA_S3_PREFIX_TTS: ${MEDIA_S3_PREFIX_TTS:-tts}
      MEDIA_S3_PREFIX_VIDEOS: ${MEDIA_S3_PREFIX_VIDEOS:-videos}
      MEDIA_S3_PREFIX_SRT: ${MEDIA_S3_PREFIX_SRT:-srt}
      MEDIA_S3_PREFIX_VIDEOS_WITH_SUBTITLE: ${MEDIA_S3_PREFIX_VIDEOS_WITH_SUBTITLE:-Video_with_Subtitle}
      TTS_ROUTER_URL: ${TTS_ROUTER_URL:-http://tts-router-service:8300}
      TTS_API_URL: ${TTS_ROUTER_URL:-http://tts-router-service:8300}
      TTS_REF_AUDIO_PATH: ${TTS_REF_AUDIO_PATH:-}
      TTS_PROMPT_TEXT: ${TTS_PROMPT_TEXT:-}
      TTS_TEXT_LANG: ${TTS_TEXT_LANG:-ko}
      TTS_PROMPT_LANG: ${TTS_PROMPT_LANG:-ko}
      TTS_TOP_K: ${TTS_TOP_K:-20}
      TTS_SAMPLE_STEPS: ${TTS_SAMPLE_STEPS:-32}
      TTS_SUPER_SAMPLING: ${TTS_SUPER_SAMPLING:-true}
      TTS_FRAGMENT_INTERVAL: ${TTS_FRAGMENT_INTERVAL:-0.4}
      TTS_FIXED_SEEDS: ${TTS_FIXED_SEEDS:-}
      TTS_OPENING_AUDIO_PATH: ${TTS_OPENING_AUDIO_PATH:-/app/runtime/tts-fixed/opening.wav}
      TTS_ENDING_AUDIO_PATH: ${TTS_ENDING_AUDIO_PATH:-/app/runtime/tts-fixed/ending.wav}
      TTS_CONCAT_RETRIES: ${TTS_CONCAT_RETRIES:-2}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
      HEYGEN_AVATAR_ID: ${HEYGEN_AVATAR_ID:-}
      HEYGEN_VIDEO_WIDTH: ${HEYGEN_VIDEO_WIDTH:-1080}
      HEYGEN_VIDEO_HEIGHT: ${HEYGEN_VIDEO_HEIGHT:-1920}
      HEYGEN_CAPTION_ENABLED: ${HEYGEN_CAPTION_ENABLED:-false}
      HEYGEN_SPEED: ${HEYGEN_SPEED:-1.3}
      HEYGEN_POLL_INTERVAL_SECONDS: ${HEYGEN_POLL_INTERVAL_SECONDS:-10}
      HEYGEN_MAX_WAIT_SECONDS: ${HEYGEN_MAX_WAIT_SECONDS:-900}
      HEYGEN_MOCK_ENABLED: ${HEYGEN_MOCK_ENABLED:-false}
      HEYGEN_MOCK_VIDEO_URL: ${HEYGEN_MOCK_VIDEO_URL:-https://samplelib.com/lib/preview/mp4/sample-5s.mp4}
      HEYGEN_PIPELINE_SERVICE_URL: ${HEYGEN_PIPELINE_SERVICE_URL:-http://heygen-pipeline-service:8100}
      SEEDLAB_SERVICE_URL: ${SEEDLAB_SERVICE_URL:-http://seed-lab-service:8300}
      SEEDLAB_SIGNING_SECRET: ${SEEDLAB_SIGNING_SECRET:-}
      SEEDLAB_LINK_TTL_SECONDS: ${SEEDLAB_LINK_TTL_SECONDS:-604800}
      SEEDLAB_PUBLIC_BASE_URL: ${SEEDLAB_PUBLIC_BASE_URL:-}
      COST_VIEWER_BASIC_USER: ${COST_VIEWER_BASIC_USER:-}
      COST_VIEWER_BASIC_PASSWORD: ${COST_VIEWER_BASIC_PASSWORD:-}
      COST_VIEWER_PUBLIC_BASE_URL: ${COST_VIEWER_PUBLIC_BASE_URL:-}
      COST_VIEWER_LINK_TTL_SECONDS: ${COST_VIEWER_LINK_TTL_SECONDS:-604800}
      COST_USD_KRW_RATE: ${COST_USD_KRW_RATE:-1350}
      COST_DEFAULT_LIST_LIMIT: ${COST_DEFAULT_LIST_LIMIT:-50}
      COST_MAX_LIST_LIMIT: ${COST_MAX_LIST_LIMIT:-200}
      SCRIPT_REWRITE_INPUT_COST_USD_PER_1M: ${SCRIPT_REWRITE_INPUT_COST_USD_PER_1M:-0}
      SCRIPT_REWRITE_OUTPUT_COST_USD_PER_1M: ${SCRIPT_REWRITE_OUTPUT_COST_USD_PER_1M:-0}
      TTS_COST_USD_PER_1K_CHARS: ${TTS_COST_USD_PER_1K_CHARS:-0}
      HEYGEN_FALLBACK_COST_USD_PER_VIDEO: ${HEYGEN_FALLBACK_COST_USD_PER_VIDEO:-0}
      AWS_DAILY_FIXED_USD: ${AWS_DAILY_FIXED_USD:-0}
      RUNPOD_DAILY_FIXED_USD: ${RUNPOD_DAILY_FIXED_USD:-0}
      RUNPOD_GPU_COST_USD_PER_HOUR: ${RUNPOD_GPU_COST_USD_PER_HOUR:-0}
    volumes:
      - ./runtime/tts-fixed:/app/runtime/tts-fixed:ro
    ports:
      - "8080:8080"
    networks:
      - internal

  seed-lab-service:
    depends_on:
      seed-lab-init:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: seed-lab-service/Dockerfile
    restart: always
    environment:
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      SEEDLAB_GATEWAY_URL: ${SEEDLAB_GATEWAY_URL:-http://messenger-gateway:8080}
      TTS_ROUTER_URL: ${TTS_ROUTER_URL:-http://tts-router-service:8300}
      TTS_API_URL: ${TTS_ROUTER_URL:-http://tts-router-service:8300}
      OPENAI_FALLBACK_API_KEY: ${OPENAI_FALLBACK_API_KEY:-}
      OPENAI_API_KEY_SEEDLAB_ASR: ${OPENAI_API_KEY_SEEDLAB_ASR:-}
      OPENAI_API_KEY_SEEDLAB_JUDGE: ${OPENAI_API_KEY_SEEDLAB_JUDGE:-}
      SEEDLAB_RUN_ROOT: /app/runtime/seed-lab/runs
      SEEDLAB_DEFAULT_DATASET: /app/scripts/seed_lab_dataset.local.json
      SEEDLAB_QUEUE_CONCURRENCY: ${SEEDLAB_QUEUE_CONCURRENCY:-1}
      SEEDLAB_SAMPLE_CONCURRENCY: ${SEEDLAB_SAMPLE_CONCURRENCY:-2}
      SEEDLAB_ASR_MODEL: ${SEEDLAB_ASR_MODEL:-gpt-4o-transcribe}
      SEEDLAB_JUDGE_MODEL: ${SEEDLAB_JUDGE_MODEL:-gpt-5.4}
      SEEDLAB_AUTO_EVAL_TIMEOUT: ${SEEDLAB_AUTO_EVAL_TIMEOUT:-120}
      SEEDLAB_EVALUATION_PROFILE: ${SEEDLAB_EVALUATION_PROFILE:-hybrid}
      SEEDLAB_REFERENCE_AUDIO_LOCAL_PATH: ${SEEDLAB_REFERENCE_AUDIO_LOCAL_PATH:-}
      SEEDLAB_REFERENCE_AUDIO_S3_URI: ${SEEDLAB_REFERENCE_AUDIO_S3_URI:-}
      SEEDLAB_REFERENCE_AUDIO_CACHE_DIR: ${SEEDLAB_REFERENCE_AUDIO_CACHE_DIR:-}
      SEEDLAB_BASE_SCRIPT_TEXT: ${SEEDLAB_BASE_SCRIPT_TEXT:-}
      SEEDLAB_DISABLE_LLM_NOTE: ${SEEDLAB_DISABLE_LLM_NOTE:-false}
      SEEDLAB_LANGUAGE: ${SEEDLAB_LANGUAGE:-ko}
      SEEDLAB_EVAL_MODE: ${SEEDLAB_EVAL_MODE:-runpod_pod}
      SEEDLAB_EVAL_RUNPOD_URL: ${SEEDLAB_EVAL_RUNPOD_URL:-}
      SEEDLAB_EVAL_RUNPOD_SHARED_SECRET: ${SEEDLAB_EVAL_RUNPOD_SHARED_SECRET:-}
      SEEDLAB_EVAL_RUNPOD_TIMEOUT: ${SEEDLAB_EVAL_RUNPOD_TIMEOUT:-180}
      SEEDLAB_EVAL_RUNPOD_POLL_INTERVAL: ${SEEDLAB_EVAL_RUNPOD_POLL_INTERVAL:-2}
      SEEDLAB_SAMPLE_S3_BUCKET: ${SEEDLAB_SAMPLE_S3_BUCKET:-}
      SEEDLAB_SAMPLE_S3_PREFIX: ${SEEDLAB_SAMPLE_S3_PREFIX:-seed-lab-samples}
      SEEDLAB_SAMPLE_S3_REGION: ${SEEDLAB_SAMPLE_S3_REGION:-ap-northeast-2}
      MEDIA_S3_BUCKET: ${MEDIA_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - ./runtime/seed-lab:/app/runtime/seed-lab
    networks:
      - internal

  seed-lab-init:
    image: alpine:3.20
    restart: "no"
    command:
      - /bin/sh
      - -lc
      - mkdir -p /app/runtime/seed-lab/runs && chown -R 10001:10001 /app/runtime/seed-lab
    volumes:
      - ./runtime/seed-lab:/app/runtime/seed-lab

  sns-publisher-service:
    build: ./sns-publisher-service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      COST_TRACKING_GATEWAY_URL: ${COST_TRACKING_GATEWAY_URL:-http://messenger-gateway:8080}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN:-}
      YOUTUBE_SCOPES: ${YOUTUBE_SCOPES:-}
      YOUTUBE_PRIVACY_STATUS_DEFAULT: ${YOUTUBE_PRIVACY_STATUS_DEFAULT:-private}
      YOUTUBE_MADE_FOR_KIDS_DEFAULT: ${YOUTUBE_MADE_FOR_KIDS_DEFAULT:-false}
      YOUTUBE_CATEGORY_ID_DEFAULT: ${YOUTUBE_CATEGORY_ID_DEFAULT:-28}
      YOUTUBE_CAPTION_UPLOAD_ENABLED: ${YOUTUBE_CAPTION_UPLOAD_ENABLED:-true}
      YOUTUBE_CAPTION_LANGUAGE: ${YOUTUBE_CAPTION_LANGUAGE:-ko}
      YOUTUBE_CAPTION_NAME: ${YOUTUBE_CAPTION_NAME:-Korean}
      YOUTUBE_CAPTION_IS_DRAFT: ${YOUTUBE_CAPTION_IS_DRAFT:-false}
      YOUTUBE_CAPTION_ASR_MODEL: ${YOUTUBE_CAPTION_ASR_MODEL:-gpt-4o-transcribe}
      YOUTUBE_CAPTION_BODY_SPLIT_MODE: ${YOUTUBE_CAPTION_BODY_SPLIT_MODE:-aggressive}
      YOUTUBE_CAPTION_BODY_TARGET_CHARS: ${YOUTUBE_CAPTION_BODY_TARGET_CHARS:-10}
      YOUTUBE_CAPTION_BODY_HARD_MAX_CHARS: ${YOUTUBE_CAPTION_BODY_HARD_MAX_CHARS:-16}
      YOUTUBE_CAPTION_BODY_MAX_CHUNKS_PER_SENTENCE: ${YOUTUBE_CAPTION_BODY_MAX_CHUNKS_PER_SENTENCE:-4}
      YOUTUBE_CAPTION_BODY_MIN_CUE_MS: ${YOUTUBE_CAPTION_BODY_MIN_CUE_MS:-450}
      YOUTUBE_ASR_COST_USD_PER_MINUTE: ${YOUTUBE_ASR_COST_USD_PER_MINUTE:-0.006}
      OPENAI_FALLBACK_API_KEY: ${OPENAI_FALLBACK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_YOUTUBE_ASR: ${OPENAI_API_KEY_YOUTUBE_ASR:-}
      INSTAGRAM_GRAPH_API_VERSION: ${INSTAGRAM_GRAPH_API_VERSION:-v23.0}
      INSTAGRAM_PAGE_ACCESS_TOKEN: ${INSTAGRAM_PAGE_ACCESS_TOKEN:-}
      INSTAGRAM_PAGE_ID: ${INSTAGRAM_PAGE_ID:-}
      INSTAGRAM_IG_USER_ID: ${INSTAGRAM_IG_USER_ID:-}
      INSTAGRAM_SHARE_TO_FEED_DEFAULT: ${INSTAGRAM_SHARE_TO_FEED_DEFAULT:-false}
      INSTAGRAM_POLL_INTERVAL_SECONDS: ${INSTAGRAM_POLL_INTERVAL_SECONDS:-10}
      INSTAGRAM_MAX_WAIT_SECONDS: ${INSTAGRAM_MAX_WAIT_SECONDS:-600}
    networks:
      - internal

  heygen-pipeline-service:
    build:
      context: ..
      dockerfile: ai-influencer/heygen-pipeline-service/Dockerfile
    restart: always
    environment:
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      COST_TRACKING_GATEWAY_URL: ${COST_TRACKING_GATEWAY_URL:-http://messenger-gateway:8080}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
      HEYGEN_AVATAR_ID: ${HEYGEN_AVATAR_ID:-}
      OPENAI_FALLBACK_API_KEY: ${OPENAI_FALLBACK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_CONTENT_METADATA: ${OPENAI_API_KEY_CONTENT_METADATA:-}
      OPENAI_API_KEY_CONTENT_EMBEDDING: ${OPENAI_API_KEY_CONTENT_EMBEDDING:-}
      CONTENT_METADATA_INPUT_COST_USD_PER_1M: ${CONTENT_METADATA_INPUT_COST_USD_PER_1M:-0.75}
      CONTENT_METADATA_OUTPUT_COST_USD_PER_1M: ${CONTENT_METADATA_OUTPUT_COST_USD_PER_1M:-4.5}
      CONTENT_EMBEDDING_COST_USD_PER_1M_TOKENS: ${CONTENT_EMBEDDING_COST_USD_PER_1M_TOKENS:-0.02}
      DB_HOST: ${PERSONA_DB_HOST:-}
      DB_PORT: ${PERSONA_DB_PORT:-5432}
      DB_NAME: ${PERSONA_DB_NAME:-}
      DB_USER: ${PERSONA_DB_USER:-}
      DB_PASSWORD: ${PERSONA_DB_PASSWORD:-}
    networks:
      - internal

  tts-router-service:
    build: ./tts-router-service
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8300/healthz', timeout=2).getcode()==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    environment:
      TTS_ROUTER_MODE: ${TTS_ROUTER_MODE:-legacy_http}
      TTS_ROUTER_FAILOPEN_TO_LEGACY: ${TTS_ROUTER_FAILOPEN_TO_LEGACY:-true}
      TTS_PUBLIC_BASE_URL: ${TTS_PUBLIC_BASE_URL:-}
      TTS_LEGACY_API_URL: ${TTS_API_URL:-}
      TTS_REQUEST_TIMEOUT_SECONDS: ${TTS_REQUEST_TIMEOUT_SECONDS:-300}
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_SERVERLESS_ENDPOINT_ID: ${RUNPOD_SERVERLESS_ENDPOINT_ID:-}
      RUNPOD_API_BASE_URL: ${RUNPOD_API_BASE_URL:-https://api.runpod.ai/v2}
      RUNPOD_POLL_INTERVAL_SECONDS: ${RUNPOD_POLL_INTERVAL_SECONDS:-2}
      RUNPOD_MAX_WAIT_SECONDS: ${RUNPOD_MAX_WAIT_SECONDS:-300}
    networks:
      - internal

  discord-bot:
    build: ./discord-bot
    restart: always
    depends_on:
      - messenger-gateway
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_ALLOWED_USER_IDS: ${DISCORD_ALLOWED_USER_IDS}
      DISCORD_ALLOWED_CHANNEL_IDS: ${DISCORD_ALLOWED_CHANNEL_IDS}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      GATEWAY_URL: http://messenger-gateway:8080
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    networks:
      - internal
